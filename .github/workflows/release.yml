name: Release

on:
  push:
    tags:
      - "v*"

env:
  RUBY_VERSION: 3.3.4
  NODE_VERSION: 18.16.1
  BUNDLER_VERSION: 2.3.14      
permissions:
  contents: write
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Tag
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: api
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/campsite-api:${{ steps.tag.outputs.TAG }}
            ghcr.io/${{ github.repository_owner }}/campsite-api:latest
          build-args: |
            RUBY_VERSION=${{ env.RUBY_VERSION }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            BUNDLER_VERSION=${{ env.BUNDLER_VERSION }}
  create-release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Generate Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed "s/\${VERSION}/$VERSION/g" .github/release-template.md > release.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release.md
          overwrite_files: true
